version: "3.9"

services:
  facilitator:
    build: .
    ports:
      - "8402:8402"
    environment:
      - PORT=8402
      - RPC_URL=${RPC_URL:-https://mainnet.base.org}
      - SETTLER_KEY=${SETTLER_KEY}
      - REDIS_URL=${REDIS_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8402/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
